<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$title$</title>
        $for(author)$
        <meta name="author" content="$author$" />
        $endfor$
        <meta name="date" content="$date$" />
        <meta name="color-scheme" content="light dark" />
        <meta name="robots" content="noai, noimageai" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap"
            rel="stylesheet"
        />
        <link
            rel="alternate"
            type="application/atom+xml"
            href="./atom.xml"
            title="Atom Feed"
        />
        <link
            rel="alternate"
            type="application/feed+json"
            href="./feed.json"
            title="JSON Feed"
        />
        <link
            rel="alternate"
            type="application/rss+xml"
            href="./rss.xml"
            title="RSS Feed"
        />
        <style>
            :root {
                --bg: #fafafa;
                --surface: #f8f9fa;
                --text: #1a1a1a;
                --text-soft: #555;
                --text-muted: #777;
                --border: #e0e0e0;
                --border-light: #ddd;
                --accent: #2563eb;
                --accent-soft: #3b82f6;
                --code-bg: #eee;
                --pre-bg: #f5f5f5;
                --pre-border: #e0e0e0;
                --pre-accent: #2c3e50;
                --table-header: #2c3e50;
                --table-stripe: #f5f6f8;
                --blockquote-bg: #fdf2f2;
                --blockquote-accent: #c0392b;
                --toc-bg: #f8f9fa;
                --abstract-bg: #f0f3f5;
                --abstract-accent: #2c3e50;
                --shadow: rgba(0, 0, 0, 0.06);
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #1a1d23;
                    --surface: #22262e;
                    --text: #e1e3e8;
                    --text-soft: #a0a4ae;
                    --text-muted: #888b94;
                    --border: #2f333c;
                    --border-light: #383d47;
                    --accent: #93a0f5;
                    --accent-soft: #7e8ce8;
                    --code-bg: #262a33;
                    --pre-bg: #22262e;
                    --pre-border: #2f333c;
                    --pre-accent: #93a0f5;
                    --table-header: #2f333c;
                    --table-stripe: #22262e;
                    --blockquote-bg: #1f232b;
                    --blockquote-accent: #93a0f5;
                    --toc-bg: #22262e;
                    --abstract-bg: #1f232b;
                    --abstract-accent: #93a0f5;
                    --shadow: rgba(0, 0, 0, 0.3);
                }
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                font-size: 18px;
                -webkit-text-size-adjust: 100%;
            }

            body {
                font-family:
                    "Newsreader", Georgia, "Times New Roman", Times, serif;
                font-optical-sizing: auto;
                font-feature-settings: "kern", "liga", "clig", "calt", "onum";
                font-kerning: normal;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                line-height: 1.7;
                color: var(--text);
                background: var(--bg);
                max-width: 720px;
                margin: 0 auto;
                padding: 2em 1.5em;
                orphans: 3;
                widows: 3;
            }

            /* ---- Body typography ---- */
            p {
                margin: 0 0 1em 0;
                text-wrap: pretty;
            }
            ul,
            ol {
                margin: 0.5em 0 1em 1.5em;
            }
            li {
                margin: 0.3em 0;
            }
            strong {
                font-weight: 600;
                font-feature-settings: "kern", "liga", "clig", "calt";
            }
            em {
                font-style: italic;
            }

            /* ---- Heading microtypography ---- */
            h1,
            h2,
            h3,
            h4 {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                    Arial, sans-serif;
                color: var(--text);
                line-height: 1.35;
                font-weight: 500;
                font-kerning: normal;
                text-wrap: balance;
            }

            h1 {
                font-size: 1.6em;
                margin: 1.6em 0 0.4em 0;
                letter-spacing: -0.018em;
                font-weight: 600;
                font-feature-settings: "kern", "liga";
            }

            h2 {
                font-size: 1.25em;
                margin: 1.7em 0 0.4em 0;
                border-bottom: 1px solid var(--border-light);
                padding-bottom: 0.25em;
                letter-spacing: 0.02em;
                font-weight: 550;
            }

            h3 {
                font-size: 1.05em;
                margin: 1.4em 0 0.3em 0;
                letter-spacing: 0.015em;
                font-weight: 550;
            }

            h4 {
                font-size: 0.95em;
                margin: 1.2em 0 0.2em 0;
                letter-spacing: 0.01em;
                font-weight: 600;
                text-transform: uppercase;
            }

            a {
                color: var(--accent);
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            code {
                background: var(--code-bg);
                padding: 0.15em 0.35em;
                border-radius: 3px;
                font-family:
                    "SF Mono", "Fira Code", Consolas, "Liberation Mono",
                    monospace;
                font-size: 82%;
            }

            pre {
                background: var(--pre-bg);
                border: 1px solid var(--pre-border);
                border-left: 3px solid var(--pre-accent);
                padding: 0.8em 1em;
                overflow-x: auto;
                margin: 1em 0;
                font-size: 82%;
            }
            pre code {
                background: none;
                padding: 0;
                font-size: inherit;
            }

            /* ---- Tables ---- */
            table {
                width: 100%;
                border-collapse: collapse;
                margin: 1.2em 0;
                font-size: 82%;
                display: block;
                overflow-x: auto;
            }
            th {
                background: var(--table-header);
                color: #fff;
                padding: 0.5em 0.6em;
                text-align: left;
                font-weight: 600;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                    Arial, sans-serif;
                letter-spacing: 0.02em;
                font-size: 0.9em;
            }
            td {
                padding: 0.4em 0.6em;
                border-bottom: 1px solid var(--border-light);
            }
            tr:nth-child(even) {
                background: var(--table-stripe);
            }

            blockquote {
                border-left: 4px solid var(--blockquote-accent);
                background: var(--blockquote-bg);
                padding: 0.5em 1em;
                margin: 1em 0;
                color: var(--text-soft);
            }

            hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 2.5em 0;
            }

            /* ---- Math ---- */
            .math.display {
                text-align: center;
                margin: 1.2em 0;
            }

            /* ---- Header / title block ---- */
            header {
                text-align: center;
                margin: 0 0 1.5em 0;
            }
            header h1 {
                font-size: 2em;
                margin: 0.5em 0 0.2em 0;
                border: none;
                letter-spacing: -0.02em;
            }
            .subtitle {
                font-size: 1.1em;
                color: var(--text-soft);
                font-style: italic;
                margin-bottom: 0.3em;
            }
            .author,
            .date {
                color: var(--text-muted);
                font-size: 0.85em;
                margin: 0.15em 0;
            }

            /* ---- Table of contents ---- */
            #TOC {
                background: var(--toc-bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 0.8em 1.2em;
                margin: 1em 0 1.5em 0;
                font-size: 0.85em;
            }
            #TOC ul {
                list-style: none;
                margin: 0.3em 0;
                padding-left: 1.2em;
            }
            #TOC > ul {
                padding-left: 0;
            }
            #TOC li {
                margin: 0.15em 0;
            }
            #TOC a {
                color: var(--accent);
            }

            /* ---- Abstract block ---- */
            section#abstract {
                background: var(--abstract-bg);
                border-left: 4px solid var(--abstract-accent);
                padding: 1em 1.2em;
                margin: 1.5em 0;
                font-size: 0.93em;
                border-radius: 2px;
            }

            .footnote-ref {
                font-size: 0.8em;
                vertical-align: super;
                line-height: 0;
            }
            .footnotes {
                font-size: 0.85em;
                color: var(--text-soft);
                border-top: 1px solid var(--border);
                margin-top: 2em;
                padding-top: 1em;
            }

            @media (max-width: 600px) {
                html {
                    font-size: 16px;
                }
                body {
                    padding: 1em 0.8em;
                }
                h1 {
                    font-size: 1.4em;
                }
                h2 {
                    font-size: 1.15em;
                }
                header h1 {
                    font-size: 1.65em;
                }
                table {
                    font-size: 75%;
                }
            }
        </style>
        $if(math)$ $math$ $endif$
    </head>
    <body>
        <header>
            <h1>$title$</h1>
            $if(subtitle)$
            <p class="subtitle">$subtitle$</p>
            $endif$ $for(author)$
            <p class="author">$author$</p>
            $endfor$
            <p class="date">$date$</p>
        </header>
        $if(toc)$
        <nav id="TOC" role="doc-toc">$toc$</nav>
        $endif$ $body$
    </body>
</html>
